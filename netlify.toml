[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/odoo"
  to = "/.netlify/functions/odoo"
  status = 200

[[redirects]]
  from = "/assistant"
  to = "/#assistant"
  status = 200

[[redirects]]
  from = "/ai"
  to = "/#assistant"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
