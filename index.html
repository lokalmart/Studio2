<html lang="id">

  <style>

    *{box-sizing:border-box} html,body{height:100%} body{margin:0;background:radial-gradient(circle at 0 0,rgba(245,158,11,.24),transparent 32%),linear-gradient(180deg,#130f0b,#070605 85%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden} button,input,textarea,select{font:inherit;color:inherit} button{cursor:pointer;border:0}.app{height:100dvh;max-width:1280px;margin:0 auto;padding:14px;display:grid;grid-template-rows:auto 1fr;gap:12px}.top{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 14px;border:1px solid var(--line);background:rgba(23,18,14,.82);border-radius:26px;box-shadow:var(--shadow);backdrop-filter:blur(18px)}.brand{display:flex;gap:12px;align-items:center;min-width:0}.logo{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand2));font-weight:950;color:#1b1003;letter-spacing:-.06em}.brand h1{font-size:17px;margin:0;line-height:1.1}.brand p{font-size:12px;margin:3px 0 0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.top-actions{display:flex;gap:8px;align-items:center}.mode-tabs{display:flex;padding:5px;border:1px solid var(--line);border-radius:18px;background:rgba(255,247,237,.05);gap:5px}.mode-tabs button{padding:9px 14px;border-radius:14px;background:transparent;color:var(--muted);font-weight:850}.mode-tabs button.active{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#1b1003}.pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:8px 10px;color:var(--muted);font-size:12px;max-width:280px}.pill b{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.icon{width:42px;height:42px;border-radius:16px;background:var(--soft);border:1px solid var(--line);display:grid;place-items:center}.stage{min-height:0;display:grid;grid-template-columns:330px 1fr;gap:12px}.stage.focus{grid-template-columns:78px 1fr}.left{min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:rgba(23,18,14,.82);box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr}.left-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px;border-bottom:1px solid var(--line)}.left-body{min-height:0;overflow:auto;padding:12px;display:grid;gap:12px}.stage.focus .left-body .hide-on-focus,.stage.focus .left-head .mode-name{display:none}.stage.focus .left{border-radius:24px}.flow{display:grid;gap:8px}.flow-step{border:1px solid var(--line);border-radius:18px;background:var(--soft);padding:10px;display:grid;gap:3px;color:var(--muted);font-size:12px}.flow-step b{color:var(--text);font-size:13px}.flow-step.active{border-color:rgba(245,158,11,.62);background:rgba(245,158,11,.15)}.stage.focus .flow-step{height:52px;display:grid;place-items:center;padding:0}.stage.focus .flow-step span,.stage.focus .flow-step small{display:none}.main{min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:rgba(23,18,14,.82);box-shadow:var(--shadow);display:grid;grid-template-rows:auto 1fr}.toolbar{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.toolbar h2,.toolbar h3{margin:0}.toolbar p{margin:4px 0 0;color:var(--muted);font-size:13px}.content{min-height:0;overflow:auto;padding:14px}.card{border:1px solid var(--line);background:var(--soft);border-radius:22px;padding:14px}.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:10px 13px;font-weight:850;color:var(--text);display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#1b1003;border:0}.btn.good{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35)}.btn.bad{background:rgba(251,113,133,.12);border-color:rgba(251,113,133,.35)}.btn:disabled{opacity:.45;cursor:not-allowed}.field{display:grid;gap:6px;margin-bottom:10px}.field label{font-size:12px;color:var(--muted);font-weight:800}.field input,.field textarea,.field select{width:100%;background:#0b0907;border:1px solid var(--line);border-radius:14px;padding:10px 11px;outline:0}.field textarea{min-height:88px;resize:vertical}.filebox{border:1px dashed rgba(245,158,11,.45);background:rgba(245,158,11,.06);border-radius:20px;padding:14px;display:grid;gap:10px}.hint{color:var(--muted);font-size:13px;line-height:1.45}.sheet-list{display:grid;gap:8px}.sheet-btn{width:100%;text-align:left;border:1px solid var(--line);border-radius:17px;background:var(--soft);padding:10px;display:grid;gap:4px}.sheet-btn.active{border-color:rgba(245,158,11,.65);background:rgba(245,158,11,.14)}.sheet-btn small{color:var(--muted);font-size:12px}.stage.focus .sheet-btn{padding:8px;place-items:center;text-align:center}.stage.focus .sheet-btn b{font-size:12px}.stage.focus .sheet-btn small{display:none}.badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;background:var(--soft);padding:6px 9px;color:var(--muted);font-size:12px;font-weight:800}.badge.good{color:#bbf7d0;border-color:rgba(34,197,94,.34);background:rgba(34,197,94,.1)}.badge.warn{color:#fef3c7;border-color:rgba(250,204,21,.34);background:rgba(250,204,21,.1)}.badge.bad{color:#fecdd3;border-color:rgba(251,113,133,.36);background:rgba(251,113,133,.1)}.badge.info{color:#bae6fd;border-color:rgba(56,189,248,.34);background:rgba(56,189,248,.1)}.tabs{display:flex;gap:7px;flex-wrap:wrap}.tabs button{border:1px solid var(--line);background:var(--soft);border-radius:999px;padding:8px 12px;color:var(--muted);font-weight:850}.tabs button.active{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.55);color:var(--text)}.editor-layout{display:grid;grid-template-columns:320px 1fr;gap:12px;align-items:start}.record-list{display:grid;gap:8px;max-height:70vh;overflow:auto}.record{border:1px solid var(--line);background:var(--soft);border-radius:18px;padding:10px;text-align:left}.record.active{border-color:rgba(245,158,11,.6);background:rgba(245,158,11,.13)}.record b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.record small{color:var(--muted)}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.form-grid .wide{grid-column:1/-1}.preview-img{width:100%;height:190px;object-fit:cover;border-radius:18px;border:1px solid var(--line);background:#0b0907}.empty-img{height:190px;border-radius:18px;border:1px dashed var(--line);display:grid;place-items:center;color:var(--muted);background:#0b0907}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#0b0907;max-height:70vh}.grid-table{border-collapse:separate;border-spacing:0;width:max-content;min-width:100%;font-size:13px}.grid-table th,.grid-table td{border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:8px;vertical-align:top;max-width:330px}.grid-table th{position:sticky;top:0;background:#18130f;text-align:left;color:#fef3c7;z-index:1}.grid-table td[contenteditable="true"]{outline:0;min-width:92px}.grid-table td[contenteditable="true"]:focus{background:rgba(245,158,11,.14)}.issue{border:1px solid var(--line);border-radius:16px;padding:10px;background:var(--soft);font-size:13px}.issue.error{border-color:rgba(251,113,133,.38);background:rgba(251,113,133,.08)}.issue.warn{border-color:rgba(250,204,21,.36);background:rgba(250,204,21,.08)}.issue.info{border-color:rgba(56,189,248,.34);background:rgba(56,189,248,.08)}.issues{display:grid;gap:8px}.schema-table{display:grid;gap:8px}.schema-field{display:grid;grid-template-columns:190px 100px 1fr;gap:8px;border:1px solid var(--line);background:var(--soft);border-radius:14px;padding:9px;font-size:13px}.schema-field small{color:var(--muted)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:flex-end;justify-content:center;padding:14px;z-index:40}.modal.active{display:flex}.sheet{width:min(760px,100%);max-height:92dvh;overflow:auto;background:#17120e;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:14px}.target-list{display:grid;gap:8px}.target-item{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:10px}.target-item.active{border-color:rgba(245,158,11,.55);background:rgba(245,158,11,.12)}.empty{display:grid;place-items:center;text-align:center;gap:8px;min-height:170px;color:var(--muted);border:1px dashed var(--line);border-radius:22px;background:var(--soft);padding:22px}.log{height:130px;overflow:auto;background:#070605;border:1px solid var(--line);border-radius:16px;padding:10px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:#ead7bd}.mini-kpi{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.kpi{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:10px}.kpi b{display:block;font-size:20px}.kpi span{color:var(--muted);font-size:12px}.switch{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:13px}.switch input{accent-color:#f59e0b}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);padding:10px 14px;border-radius:999px;background:#211a14;border:1px solid var(--line);box-shadow:var(--shadow);display:none;z-index:50}.toast.show{display:block}.project-options{display:grid;gap:8px;max-height:260px;overflow:auto}.project-option{border:1px solid var(--line);background:var(--soft);border-radius:16px;padding:10px;text-align:left}.project-option.active{border-color:rgba(245,158,11,.62);background:rgba(245,158,11,.13)}
    @media(max-width:900px){body{overflow:auto}.app{height:auto;min-height:100dvh}.stage,.stage.focus{grid-template-columns:1fr}.left{min-height:auto}.stage.focus .left-body .hide-on-focus,.stage.focus .left-head .mode-name{display:block}.stage.focus .flow-step span,.stage.focus .flow-step small{display:block}.stage.focus .flow-step{height:auto;place-items:stretch;padding:10px}.hero-grid,.editor-layout,.form-grid{grid-template-columns:1fr}.mini-kpi{grid-template-columns:repeat(2,1fr)}.top{align-items:flex-start}.top-actions{flex-wrap:wrap;justify-content:flex-end}.pill{display:none}}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="brand"><div class="logo">LM</div><div><h1>Lokalmart Studio2</h1><p>Import · Export · Preview · Native-like XLSX editor untuk Odoo</p></div></div>
      <div class="top-actions">
        <div class="mode-tabs"><button id="tabImport">⬆ Import</button><button id="tabExport">⬇ Export</button></div>
        <div class="pill"><span>Target</span><b id="targetName">Belum ada</b></div>
        <button class="icon" id="settingsBtn" title="Target Odoo">⚙</button>
      </div>
    </header>

    <main id="stage" class="stage">
      <aside class="left">
        <div class="left-head"><b class="mode-name" id="modeName">Import</b><button class="icon" id="focusBtn" title="Sembunyikan panel yang tidak fokus">↔</button></div>
        <div class="left-body" id="leftBody"></div>
      </aside>
      <section class="main"><div id="mainToolbar" class="toolbar"></div><div id="mainContent" class="content"></div></section>
    </main>
  </div>

  <div id="settingsModal" class="modal"><div class="sheet">
    <div class="toolbar" style="padding:0 0 12px;border:0"><div><h2>Target Odoo</h2><p>Simpan beberapa database. API key disimpan di browser perangkat ini.</p></div><button class="btn" id="closeSettings">Tutup</button></div>
    <div class="target-list" id="targetList"></div>
    <div style="height:12px"></div>
    <div class="card">
      <div class="field"><label>Nama Target</label><input id="tName" placeholder="edu" /></div>
      <div class="field"><label>URL</label><input id="tUrl" placeholder="https://edu-lokalmart.odoo.com" /></div>
      <div class="field"><label>Database</label><input id="tDb" placeholder="edu-lokalmart" /></div>
      <div class="field"><label>Username / Email</label><input id="tUser" placeholder="admin@email.com" /></div>
      <div class="field"><label>Password / API Key</label><input id="tPass" type="password" placeholder="API key Odoo" /></div>
      <div class="row"><button class="btn primary" id="saveTarget">Simpan Target</button><button class="btn" id="testTarget">Tes Koneksi</button><button class="btn bad" id="deleteTarget">Hapus Aktif</button></div>
      <p class="hint">Untuk Odoo Online biasanya pakai API Key, bukan password login web. URL jangan memakai <code>/web</code>.</p>
    </div>
  </div></div>
  <div class="toast" id="toast"></div>

<script>
'use strict';
const $=(s,r=document)=>r.querySelector(s); const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const MAX_GRID_ROWS=180, MAX_RECORDS=120;
const STORAGE_KEY='lokalmart_studio2_native_editor_v5';
const MODEL_ALIASES={project:'project.project',projects:'project.project',tasks:'project.task',task:'project.task',project_tasks:'project.task',milestones:'project.milestone',milestone:'project.milestone',updates:'project.update',project_updates:'project.update',products:'product.template',product:'product.template',product_template:'product.template',contacts:'res.partner',contact:'res.partner',partners:'res.partner',res_partner:'res.partner',knowledge:'knowledge.article',articles:'knowledge.article',knowledge_article:'knowledge.article',categories:'product.category',product_category:'product.category',public_categories:'product.public.category',external_ids:'ir.model.data',xmlids:'ir.model.data'};
const CONTEXT_SHEETS=new Set(['task_hierarchy','chatter_project','chatter_tasks','prompt','readme_ai','readme','dashboard','validation_report','ai_memory_index','prompt_handbook','relationship_map','task_database']);
const HELPER_SHEETS=new Set(['readme','readme_import','dashboard','validation_report','ai_memory_index','prompt_handbook','relationship_map','task_database','notes','info']);
const PROFILES={
  product:{title:'Product Editor',desc:'Validasi nama, foto, harga, vendor, barcode, kategori, status jual/publish.',fields:['name','default_code','barcode','list_price','standard_price','categ_id','public_categ_ids','sale_ok','purchase_ok','website_published','seller_ids','x_source_vendor','x_source_image_url','image_url','description_sale']},
  contact:{title:'Contact Editor',desc:'Validasi kontak: nama, WA/telepon, email, alamat, supplier/customer rank, role Lokal ID.',fields:['name','phone','mobile','email','street','street2','city','state_id','country_id','supplier_rank','customer_rank','x_lm_role','comment']},
  project:{title:'Project Editor',desc:'Validasi project/task: judul, parent, stage, deadline, external id, dan deskripsi supaya tidak muncul task liar.',fields:['name','display_name','project_id','parent_id','stage_id','user_ids','partner_id','priority','sequence','date_deadline','deadline','active','description']},
  knowledge:{title:'Knowledge Editor',desc:'Validasi artikel knowledge: judul, parent, body, dan konteks untuk ChatGPT.',fields:['name','parent_id','body','body_html','description','active']},
  sales:{title:'Sales Editor',desc:'Validasi order: customer, tanggal, status, total, dan catatan.',fields:['name','partner_id','date_order','state','amount_total','note','client_order_ref']},
  generic:{title:'Dynamic Odoo Editor',desc:'Editor mengikuti kolom XLSX dan metadata fields_get Odoo jika tersedia.',fields:['name','display_name','active','sequence','description']}
};
const app={mode:'import',focus:false,view:'form',importStep:0,exportStep:0,targets:[],activeTargetId:null,logs:[],schema:{},import:{fileName:'',sheets:[],selected:0,issues:[],activeRow:0},export:{mode:'project',fileName:'',sheets:[],selected:0,issues:[],activeRow:0,projects:[],selectedProject:null,models:'project.project, project.task, knowledge.article, product.template, res.partner',limit:300}};
function boot(){loadState(); bindStatic(); render();}
function bindStatic(){ $('#tabImport').onclick=()=>{app.mode='import';app.view='form';render()}; $('#tabExport').onclick=()=>{app.mode='export';app.view='form';render()}; $('#settingsBtn').onclick=openSettings; $('#focusBtn').onclick=()=>{app.focus=!app.focus;persist();render()}; $('#closeSettings').onclick=()=>$('#settingsModal').classList.remove('active'); $('#saveTarget').onclick=saveTarget; $('#testTarget').onclick=testTarget; $('#deleteTarget').onclick=deleteTarget; }
function loadState(){try{const raw=localStorage.getItem(STORAGE_KEY); if(raw){const saved=JSON.parse(raw); app.targets=saved.targets||[]; app.activeTargetId=saved.activeTargetId||null; app.focus=!!saved.focus;}}catch(_){}}
function persist(){localStorage.setItem(STORAGE_KEY,JSON.stringify({targets:app.targets,activeTargetId:app.activeTargetId,focus:app.focus}));}
function activeTarget(){return app.targets.find(t=>t.id===app.activeTargetId)||null}
function render(){ $('#stage').classList.toggle('focus',app.focus && currentSheets().length>0); $('#tabImport').classList.toggle('active',app.mode==='import'); $('#tabExport').classList.toggle('active',app.mode==='export'); $('#modeName').textContent=app.mode==='import'?'Import XLSX':'Export XLSX'; const t=activeTarget(); $('#targetName').textContent=t?t.name:'Belum ada'; renderLeft(); renderMain(); }
function currentState(){return app.mode==='import'?app.import:app.export} function currentSheets(){return currentState().sheets||[]} function selectedSheet(){const s=currentState(); return s.sheets[s.selected]||null}
function renderLeft(){const body=$('#leftBody'); const flow=app.mode==='import'?renderFlow(app.importStep,[['1','Upload'],['2','Preview'],['3','Editor'],['4','Import']]):renderFlow(app.exportStep,[['1','Pilih'],['2','Ambil'],['3','Editor'],['4','Download']]); const controls=app.mode==='import'?renderImportControls():renderExportControls(); const sheets=renderSheetList(); body.innerHTML=`${flow}<div class="hide-on-focus">${controls}</div>${sheets}<div class="hide-on-focus"><div class="log" id="logBox">${app.logs.slice(-40).map(l=>escapeHtml(l)).join('<br>')}</div></div>`; bindLeft(); }
function renderFlow(active,steps){return `<div class="flow">${steps.map((s,i)=>`<div class="flow-step ${i===active?'active':''}"><b>${s[0]}</b><span>${s[1]}</span><small>${i===active?'fokus sekarang':'otomatis tersembunyi saat selesai'}</small></div>`).join('')}</div>`}
function renderImportControls(){return `<div class="filebox"><b>Upload XLSX</b><span class="hint">File dibaca di browser dulu. Studio baru import setelah preview, editor, dan validasi.</span><input id="importFile" type="file" accept=".xlsx,.xls"/><button class="btn primary" id="readImport">Preview & buka editor</button><span class="hint">${escapeHtml(app.import.fileName||'Belum ada file.')}</span></div><div class="row"><button class="btn" id="downloadImport" ${app.import.sheets.length?'':'disabled'}>Download hasil edit</button><button class="btn good" id="importNow" ${canImportNow()?'':'disabled'}>Import ke Odoo</button></div>`}
function renderExportControls(){const e=app.export; const mode=`<div class="row"><button class="btn ${e.mode==='project'?'primary':''}" data-exp-mode="project">Project</button><button class="btn ${e.mode==='model'?'primary':''}" data-exp-mode="model">Model</button></div>`; if(e.mode==='project') return `<div class="card"><b>Export Project</b><p class="hint">Cocok untuk membawa konteks Ground Zero / Soraya Kitchen ke ChatGPT lain.</p>${mode}<div style="height:10px"></div><button class="btn" id="loadProjects">Muat Project</button><div class="project-options">${e.projects.map(p=>`<button class="project-option ${e.selectedProject===p.id?'active':''}" data-pid="${p.id}"><b>${escapeHtml(p.name||p.display_name||('Project '+p.id))}</b><br><span class="hint">write: ${escapeHtml(p.write_date||'')}</span></button>`).join('')||'<div class="empty" style="min-height:90px">Klik Muat Project.</div>'}</div><button class="btn primary" id="exportProject" ${e.selectedProject?'':'disabled'}>Export ke editor</button></div><div class="row"><button class="btn" id="downloadExport" ${e.sheets.length?'':'disabled'}>Download hasil edit</button><button class="btn good" id="downloadPatch" ${e.sheets.length?'':'disabled'}>Buat import patch</button></div>`; return `<div class="card"><b>Export Model</b><p class="hint">Ambil record dari Odoo, lalu edit/rapikan sebagai XLSX.</p>${mode}<div class="field"><label>Models</label><textarea id="exportModels">${escapeHtml(e.models)}</textarea></div><div class="field"><label>Limit per model</label><input id="exportLimit" type="number" min="1" max="3000" value="${escapeAttr(String(e.limit||300))}"/></div><button class="btn primary" id="exportModelsBtn">Export ke editor</button></div><div class="row"><button class="btn" id="downloadExport" ${e.sheets.length?'':'disabled'}>Download hasil edit</button><button class="btn good" id="downloadPatch" ${e.sheets.length?'':'disabled'}>Buat import patch</button></div>`}
function renderSheetList(){const sheets=currentSheets(); if(!sheets.length)return '<div class="hide-on-focus"><div class="empty">Belum ada sheet.</div></div>'; const visible=sheets.filter(sh=>!sh.hidden || app.focus); return `<div><div class="row" style="justify-content:space-between;margin-bottom:8px"><b class="hide-on-focus">Sheet</b><span class="badge">${sheets.length} total</span></div><div class="sheet-list">${visible.map((sh)=>{const i=sheets.indexOf(sh); const issues=validateSheet(sh,false); const err=issues.filter(x=>x.level==='error').length; return `<button class="sheet-btn ${i===currentState().selected?'active':''}" data-sheet="${i}"><b>${escapeHtml(shortName(sh.name))}</b><small>${escapeHtml(sh.model||sh.role)} · ${sh.rows.length} row · ${err} error</small></button>`}).join('')}</div></div>`}

async function readImportFile(){const input=$('#importFile'); const file=input?.files?.[0]; if(!file)return alert('Pilih file XLSX dulu.'); try{ensureXlsx(); app.importStep=1; toast('Membaca XLSX...'); const base64=await fileToBase64(file); app.import={fileName:file.name,sheets:parseWorkbook(base64,file.name),selected:0,issues:[],activeRow:0}; app.importStep=2; app.focus=true; log('Preview siap: '+file.name); const sh=app.import.sheets[0]; if(sh)ensureSchema(sh); render();}catch(e){alert(e.message||String(e));log('Gagal membaca XLSX: '+(e.message||e));}}
function parseWorkbook(base64,fileName){ensureXlsx(); const wb=XLSX.read(base64,{type:'base64',cellDates:false}); return wb.SheetNames.map(name=>{const ws=wb.Sheets[name]; const rows=XLSX.utils.sheet_to_json(ws,{defval:'',raw:false,blankrows:false}).filter(r=>Object.values(r).some(v=>!blank(v))); const columns=collectColumns(rows,ws); const model=detectModel(name,rows); const type=detectType(name,model,columns); const role=detectRole(name,model,rows); return {name,fileName,rows,columns,model,type,role,hidden:role==='empty'||role==='context'};});}

function detectModel(name,rows){const fromRow=(rows.find(r=>r._model||r.__model)||{}); if(fromRow._model||fromRow.__model)return String(fromRow._model||fromRow.__model).trim(); const raw=String(name||'').trim(); if(raw.includes('.'))return raw; return MODEL_ALIASES[raw.toLowerCase().replace(/[\s-]+/g,'_')]||'';}

function detectType(name,model,cols){const key=(name+' '+model+' '+cols.join(' ')).toLowerCase(); if(key.includes('product.template')||key.includes('product.product')||key.includes('list_price')||key.includes('barcode')||key.includes('image_url'))return 'product'; if(key.includes('res.partner')||key.includes('contact')||key.includes('phone')||key.includes('mobile')||key.includes('email'))return 'contact'; if(key.includes('project.task')||key.includes('project.project')||key.includes('project.milestone')||key.includes('project.update')||key.includes('parent_id')||key.includes('stage_id'))return 'project'; if(key.includes('knowledge.article')||key.includes('knowledge')||key.includes('body_html'))return 'knowledge'; if(key.includes('sale.order'))return 'sales'; return 'generic';}
function validateSheet(sh,limit=true){const issues=[]; const rows=limit?sh.rows.slice(0,500):sh.rows.slice(0,80); if(sh.role==='empty'){issues.push({level:'info',row:'sheet',msg:'Sheet kosong disembunyikan dari import.'});return issues;} if(sh.role==='context'){issues.push({level:'info',row:'sheet',msg:'Sheet context/helper. Tidak wajib punya _model dan tidak dikirim ke import kecuali kamu ubah menjadi model sheet.'});return issues;} if(!sh.model&&!sh.columns.includes('_model'))issues.push({level:'warn',row:'sheet',msg:'Model belum jelas. Isi _model atau ubah nama sheet menjadi nama model Odoo.'}); const schema=schemaFor(sh.model); const nameCol=firstCol(sh,['name','display_name']); rows.forEach((r,i)=>{const row=i+2; const m=r._model||r.__model||sh.model; if(!m)issues.push({level:'error',row,msg:'_model kosong. Odoo tidak tahu record ini untuk model apa.'}); const act=String(r.__action||r._action||r.action||'upsert').toLowerCase(); if(['update','write','delete','archive'].includes(act)&&!r._external_id&&!r.id)issues.push({level:'error',row,msg:'Action update/delete/archive butuh id atau _external_id.'}); if(nameCol&&!String(r[nameCol]||'').trim()&&['product','contact','project','knowledge'].includes(sh.type))issues.push({level:'warn',row,msg:'Nama/display_name kosong.'}); if(sh.type==='product'){const priceCol=firstCol(sh,['list_price','price','harga','x_source_price']); if(priceCol&&String(r[priceCol]||'').trim()&&isNaN(num(r[priceCol])))issues.push({level:'error',row,msg:'Harga bukan angka.'}); if(!priceCol||blank(r[priceCol]))issues.push({level:'warn',row,msg:'Harga kosong. Aman sebagai draft, jangan publish dulu.'}); if(!getImageValue(sh,r))issues.push({level:'warn',row,msg:'Foto produk kosong atau belum berupa URL/base64.'}); if(!firstVal(sh,r,['x_source_vendor','vendor','supplier','seller_ids']))issues.push({level:'warn',row,msg:'Vendor/supplier kosong.'});}
 if(sh.type==='contact'&&!firstVal(sh,r,['phone','mobile','email']))issues.push({level:'warn',row,msg:'Kontak tanpa WA/telepon/email.'}); if(sh.type==='project'&&String(m)==='project.task'&&!firstVal(sh,r,['project_id','project_id_external_id']))issues.push({level:'warn',row,msg:'Task belum punya project_id.'}); if(schema){for(const f of schema.required||[]){if(!['id','create_uid','create_date','write_uid','write_date'].includes(f)&&blank(r[f])&&!r.id)issues.push({level:'warn',row,msg:`Field required Odoo kosong: ${f}`});}} }); if(!issues.length)issues.push({level:'info',row:'sheet',msg:'Tidak ditemukan masalah besar.'}); return issues.slice(0,350);}

function schemaFor(model){return model?app.schema[model]:null} function fieldMeta(model,field){const s=schemaFor(model); return (s?.fields||[]).find(f=>f.name===field)||null}
function editorFields(sh,row){const profile=PROFILES[sh.type]||PROFILES.generic; const set=new Set(['_model','__action','_external_id','id',...profile.fields,...(sh.columns||[]).filter(c=>!String(c).startsWith('children.'))]); const schema=schemaFor(sh.model); if(schema){(schema.required||[]).forEach(f=>set.add(f)); (schema.preferred||[]).slice(0,20).forEach(f=>set.add(f));} return Array.from(set).filter(f=>f&&!(f==='empty')&&f in row || ['_model','__action','_external_id','id'].includes(f) || profile.fields.includes(f) || (schemaFor(sh.model)?.required||[]).includes(f)).slice(0,70);}
function sheetKpis(sh,issues){return [{k:'Rows',v:String(sh.rows.length)},{k:'Kolom',v:String(sh.columns.length)},{k:'Error',v:String(issues.filter(i=>i.level==='error').length)},{k:'Warning',v:String(issues.filter(i=>i.level==='warn').length)}]}
function rowTitle(sh,r,i){return r.name||r.display_name||r.title||r.default_code||r.id||`Row ${i+2}`} function rowSub(sh,r){return [r._model||sh.model,r.__action||r.action||'',r.write_date||r.date_deadline||r.email||r.barcode||''].filter(Boolean).join(' · ')}
function getImageValue(sh,row){return firstVal(sh,row,['image_url','x_source_image_url','image_1920','image','image_512'])} function firstVal(sh,row,names){for(const n of names){if(n in row&&!blank(row[n]))return row[n];} const lower=Object.keys(row).find(k=>names.includes(k.toLowerCase())); return lower?row[lower]:''} function firstCol(sh,names){const cols=sh.columns||[]; return names.find(n=>cols.includes(n)) || cols.find(c=>names.includes(c.toLowerCase())) || ''}
function sheetsToBase64(sheets){ensureXlsx(); const wb=XLSX.utils.book_new(); (sheets||[]).forEach(sh=>{const rows=normalizeRows(sh); let ws; if(rows.length)ws=XLSX.utils.json_to_sheet(rows,{header:sh.columns.length?sh.columns:undefined}); else ws=XLSX.utils.aoa_to_sheet([sh.columns.length?sh.columns:['empty']]); XLSX.utils.book_append_sheet(wb,ws,safeSheetName(sh.name));}); return XLSX.write(wb,{bookType:'xlsx',type:'base64'});}
function normalizeRows(sh){const cols=[...new Set([...(sh.columns||[]),...collectColumns(sh.rows)])]; sh.columns=cols; return (sh.rows||[]).map(r=>{const out={}; cols.forEach(c=>out[c]=r[c]??''); return out;});}
function downloadSheets(sheets,fileName){const base64=sheetsToBase64(sheets); const a=document.createElement('a'); a.href='data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,'+base64; a.download=fileName; document.body.appendChild(a); a.click(); a.remove(); log('Download: '+fileName);}
async function callOdoo(action,payload){const t=activeTarget(); if(!t)throw new Error('Target Odoo belum disimpan.'); const resp=await fetch('/api/odoo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,target:normalizeTarget(t),payload})}); const txt=await resp.text(); let data; try{data=JSON.parse(txt)}catch(_){throw new Error('Server non-JSON HTTP '+resp.status+': '+txt.slice(0,500));} if(!resp.ok||data.ok===false)throw new Error(data.error||('HTTP '+resp.status)); return data;}
function normalizeTarget(t){return {url:String(t.url||'').replace(/\/web\/?$/,'').replace(/\/+$/,''),db:t.db,username:t.username,password:t.password}}
function openSettings(){renderTargets(); const t=activeTarget()||{}; $('#tName').value=t.name||''; $('#tUrl').value=t.url||''; $('#tDb').value=t.db||''; $('#tUser').value=t.username||''; $('#tPass').value=t.password||''; $('#settingsModal').classList.add('active');}
function renderTargets(){$('#targetList').innerHTML=app.targets.map(t=>`<div class="target-item ${t.id===app.activeTargetId?'active':''}"><div><b>${escapeHtml(t.name)}</b><br><span class="hint">${escapeHtml(t.url)} · ${escapeHtml(t.db)}</span></div><button class="btn" data-target="${escapeAttr(t.id)}">Pakai</button></div>`).join('')||'<div class="empty" style="min-height:80px">Belum ada target tersimpan.</div>'; $$('[data-target]').forEach(b=>b.onclick=()=>{app.activeTargetId=b.dataset.target;persist();render();openSettings();});}
function saveTarget(){const id=app.activeTargetId||('t_'+Date.now()); const t={id,name:$('#tName').value.trim()||'Odoo Lokalmart',url:$('#tUrl').value.trim(),db:$('#tDb').value.trim(),username:$('#tUser').value.trim(),password:$('#tPass').value}; if(!t.url||!t.db||!t.username||!t.password)return alert('URL, database, username, dan API key wajib diisi.'); const i=app.targets.findIndex(x=>x.id===id); if(i>=0)app.targets[i]=t; else app.targets.push(t); app.activeTargetId=id; persist(); render(); openSettings(); log('Target disimpan: '+t.name);}
async function testTarget(){try{const tmp={id:'tmp',name:$('#tName').value.trim()||'Temp',url:$('#tUrl').value.trim(),db:$('#tDb').value.trim(),username:$('#tUser').value.trim(),password:$('#tPass').value}; const old=app.targets.slice(), oldId=app.activeTargetId; app.targets=[...app.targets.filter(x=>x.id!=='tmp'),tmp]; app.activeTargetId='tmp'; const res=await callOdoo('test_connection',{}); app.targets=old; app.activeTargetId=oldId; alert(res.message||'Koneksi berhasil'); log('Tes koneksi berhasil'); render();}catch(e){alert(e.message||String(e));log('Tes koneksi gagal: '+(e.message||e));}}
function deleteTarget(){if(!app.activeTargetId)return; if(!confirm('Hapus target aktif?'))return; app.targets=app.targets.filter(t=>t.id!==app.activeTargetId); app.activeTargetId=app.targets[0]?.id||null; persist(); render(); openSettings();}
function ensureXlsx(){if(!window.XLSX)throw new Error('Library XLSX belum termuat. Cek koneksi/CDN SheetJS.')} function fileToBase64(file){return new Promise((res,rej)=>{const r=new FileReader(); r.onload=()=>res(String(r.result).split(',').pop()); r.onerror=rej; r.readAsDataURL(file);});}
function safeSheetName(n){return String(n||'Sheet').replace(/[\\/?*\[\]:]/g,' ').slice(0,31)||'Sheet'} function editedName(name,suffix){return `${String(name||'lokalmart.xlsx').replace(/\.xlsx?$/i,'')}_${suffix}_${new Date().toISOString().slice(0,10)}.xlsx`}
function shortName(n){return String(n).length>22?String(n).slice(0,19)+'…':String(n)} function blank(v){return v===null||v===undefined||String(v).trim()===''} function truthy(v){return ['true','1','yes','ya','iya','aktif','published'].includes(String(v).toLowerCase())||v===true} function num(v){return Number(String(v).replace(/[^0-9,.-]/g,'').replace(',','.'))} function displayVal(v){if(Array.isArray(v))return JSON.stringify(v); return v??''} function isImageLike(v){return /^https?:\/\//i.test(String(v))||/^data:image\//i.test(String(v))||/^[A-Za-z0-9+/=]{200,}$/.test(String(v))} function imageSrc(v){const s=String(v||''); if(/^https?:\/\//i.test(s)||/^data:image\//i.test(s))return s; return 'data:image/jpeg;base64,'+s}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))} function escapeAttr(s){return escapeHtml(s).replace(/`/g,'&#96;')}
function log(msg){const line='['+new Date().toLocaleTimeString()+'] '+msg; app.logs.push(line); if(app.logs.length>120)app.logs.shift(); const box=$('#logBox'); if(box)box.innerHTML=app.logs.slice(-40).map(l=>escapeHtml(l)).join('<br>');} function toast(msg){const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1800)}
document.addEventListener('DOMContentLoaded',boot);
</script>
